# Entity Facts: Semantic View YAML
#
# Deploy with:
#   CALL SYSTEM$CREATE_SEMANTIC_VIEW_FROM_YAML('TARGET_DB.TARGET_SCHEMA', $$ <contents> $$);
#
# Verify without deploying (dry-run):
#   CALL SYSTEM$CREATE_SEMANTIC_VIEW_FROM_YAML('TARGET_DB.TARGET_SCHEMA', $$ <contents> $$, TRUE);
#
# DDL-only features:
#   - AI_SQL_GENERATION (set post-deploy via ALTER SEMANTIC VIEW)
#   - PRIVATE entity-level aggregated facts → YAML equivalent: access_modifier: private_access

name: CUSTOMER_ORDERS_SV
description: >
  Customer order history. Demonstrates PRIVATE entity-level aggregated facts
  (lifetime_value) used to define a value_segment dimension, and a calculated
  age dimension using YEAR(CURRENT_DATE()).

tables:
  - name: customers
    description: Customer master data
    base_table:
      database: TARGET_DB
      schema: TARGET_SCHEMA
      table: CUSTOMERS
    primary_key:
      columns: [CUSTOMER_ID]
    dimensions:
      - name: customer_name
        synonyms: [name, customer]
        expr: CUSTOMER_NAME
        data_type: VARCHAR
      - name: age
        synonyms: [customer age, age in years]
        expr: YEAR(CURRENT_DATE()) - BIRTH_YEAR
        data_type: NUMBER
      - name: value_segment
        synonyms: [customer tier, value tier, segment]
        description: >
          Customer tier based on lifetime spend. References the private
          lifetime_value fact by logical name — not a raw aggregate expression.
        expr: >
          CASE
            WHEN lifetime_value < 1000  THEN 'low'
            WHEN lifetime_value <= 3000 THEN 'medium'
            ELSE 'high'
          END
        data_type: VARCHAR
    facts:
      # YAML equivalent of DDL's PRIVATE: access_modifier: private_access
      - name: lifetime_value
        synonyms: [customer LTV, customer lifetime value, total spend]
        description: Aggregated total lifetime spend per customer. Private — drives value_segment.
        expr: SUM(orders.order_amount)
        data_type: NUMBER
        access_modifier: private_access
    metrics:
      - name: customer_count
        synonyms: [customers, number of customers]
        expr: COUNT(CUSTOMER_ID)

  - name: orders
    description: Order transactions
    base_table:
      database: TARGET_DB
      schema: TARGET_SCHEMA
      table: ORDERS
    dimensions:
      - name: order_date
        synonyms: [date, purchase date]
        expr: ORDER_DATE
        data_type: DATE
      - name: order_month
        synonyms: [month, order month]
        expr: DATE_TRUNC('month', ORDER_DATE)
        data_type: DATE
    facts:
      - name: order_amount
        synonyms: [order value, transaction amount]
        expr: AMOUNT
        data_type: NUMBER
    metrics:
      - name: total_revenue
        synonyms: [revenue, total orders]
        expr: SUM(order_amount)
      - name: order_count
        synonyms: [orders, number of orders]
        expr: COUNT(ORDER_ID)

relationships:
  - name: orders_to_customers
    left_table: orders
    right_table: customers
    relationship_columns:
      - left_column: CUSTOMER_ID
        right_column: CUSTOMER_ID
