# Range Join (SCD2): Semantic View YAML
#
# Deploy with:
#   CALL SYSTEM$CREATE_SEMANTIC_VIEW_FROM_YAML('TARGET_DB.TARGET_SCHEMA', $$ <contents> $$);
#
# Verify without deploying (dry-run):
#   CALL SYSTEM$CREATE_SEMANTIC_VIEW_FROM_YAML('TARGET_DB.TARGET_SCHEMA', $$ <contents> $$, TRUE);
#
# Export an existing DDL SV to YAML:
#   SELECT SYSTEM$READ_YAML_FROM_SEMANTIC_VIEW('TARGET_DB.TARGET_SCHEMA.ORDERS_BY_SEGMENT');
#
# DDL-only features not available in YAML authoring:
#   - AI_SQL_GENERATION custom instructions (set post-deploy via ALTER SEMANTIC VIEW)
#   - BETWEEN EXCLUSIVE / ASOF range relationship syntax is NOT yet supported in YAML;
#     use DDL (semantic_view.sql) for range and ASOF join patterns.

# ⚠️  RANGE JOIN LIMITATION: The YAML spec does not currently support the
# BETWEEN EXCLUSIVE / ASOF relationship syntax. This YAML defines the table
# structure and a placeholder standard relationship. Use semantic_view.sql
# for the full range join pattern.

name: ORDERS_BY_SEGMENT
description: >
  Orders joined to the subscription tier active at time of purchase via SCD2 range
  relationship. NOTE: full range join requires DDL authoring (semantic_view.sql).

tables:
  - name: orders
    description: Order transactions
    base_table:
      database: TARGET_DB
      schema: TARGET_SCHEMA
      table: ORDERS
    primary_key:
      columns: [ORDER_ID]
    dimensions:
      - name: order_id
        expr: ORDER_ID
        data_type: NUMBER
      - name: customer_id
        expr: CUSTOMER_ID
        data_type: NUMBER
      - name: order_date
        expr: ORDER_DATE
        data_type: DATE
    facts:
      - name: order_revenue
        description: Order amount in USD
        expr: ORDER_AMOUNT
        data_type: NUMBER
    metrics:
      - name: total_revenue
        synonyms: [revenue, total sales, gmv]
        description: Sum of order amounts
        expr: SUM(order_revenue)
      - name: order_count
        synonyms: [number of orders, orders, order volume]
        description: Number of orders
        expr: COUNT(order_id)

  - name: customer_segments
    description: SCD2 subscription tier history — one row per customer per period
    base_table:
      database: TARGET_DB
      schema: TARGET_SCHEMA
      table: CUSTOMER_SEGMENTS
    primary_key:
      columns: [SEGMENT_ID]
    dimensions:
      - name: segment
        synonyms: [tier, subscription tier, plan, customer plan]
        description: Subscription tier active at time of order (historically resolved via range join)
        expr: SEGMENT
        data_type: VARCHAR
      - name: valid_from
        description: Start of this segment period (inclusive)
        expr: VALID_FROM
        data_type: DATE
      - name: valid_to
        description: End of this segment period (exclusive; 9999-12-31 = current)
        expr: VALID_TO
        data_type: DATE

# NOTE: The YAML spec does not support BETWEEN EXCLUSIVE range syntax.
# For the full SCD2 temporal join pattern, use semantic_view.sql which uses:
#   orders_to_segment AS orders(CUSTOMER_ID, ORDER_DATE)
#     REFERENCES customer_segments(CUSTOMER_ID, BETWEEN VALID_FROM AND VALID_TO EXCLUSIVE)
relationships:
  - name: orders_to_segment
    left_table: orders
    right_table: customer_segments
    relationship_columns:
      - left_column: CUSTOMER_ID
        right_column: CUSTOMER_ID
